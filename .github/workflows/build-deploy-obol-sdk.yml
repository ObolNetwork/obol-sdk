name: Publish Obol-SDK to NPM

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:

jobs:
  build:
    if: (github.event.pull_request.merged == true && github.event.pull_request.head.label.name == 'release') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false # Required to make GitHub forget this checkout for the next step

      - uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@obolnetwork'

      - name: Configure git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # main

      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@9989ccec43d726ef05aa1cd7b2854fb96b6df6ab # v2.2.0

      ############# TAG RELEASE ##############
      - name: "Push tag v${{ steps.package-version.outputs.current-version }}"
        uses: rickstaa/action-create-tag@a1c7777fcb2fee4f19b0f283ba888afa11678b72 # v1
        id: tag_version
        with:
          tag: "v${{ steps.package-version.outputs.current-version }}"
      
      ############# GITHUB RELEASE ##############
      - name: "Create a GitHub release v${{ steps.package-version.outputs.current-version }}"
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: "v${{ steps.package-version.outputs.current-version }}"
          name: "Release v${{ steps.package-version.outputs.current-version }}"
          body: |
            ## Release notes:
            ${{ steps.extract-release-notes.outputs.release_notes }}
          prerelease: ${{ contains(steps.package-version.outputs.current-version, '-rc.') }}

      ############# NPM RELEASE ##############
      - run: yarn install --frozen-lockfile
      - run: yarn run build
      - run: yarn run generate-typedoc 
      - name: Publish to NPM
        run: |
          VERSION="${{ steps.package-version.outputs.current-version }}"
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "Publishing RC version: $VERSION"
            yarn run npm:publish:next
          else
            echo "Publishing stable version: $VERSION"
            yarn run npm:publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RPC_MAINNET: ${{ secrets.RPC_MAINNET }}
          RPC_GNOSIS: ${{ secrets.RPC_GNOSIS }}
          RPC_SEPOLIA: ${{ secrets.RPC_SEPOLIA }}
          RPC_HOODI: ${{ secrets.RPC_HOODI }}
          HUSKY: 0
